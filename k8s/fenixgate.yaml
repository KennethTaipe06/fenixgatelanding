apiVersion: v1
kind: Namespace
metadata:
  name: fg
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fenixgate
  namespace: fg
  labels:
    app: fenixgate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fenixgate
  template:
    metadata:
      labels:
        app: fenixgate
    spec:
      containers:
        - name: fenixgate
          image: fenixgate:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: fenixgate
  namespace: fg
spec:
  selector:
    app: fenixgate
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fenixgate
  namespace: fg
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - fenixgate.lat
        - www.fenixgate.lat
      secretName: fenixgate-tls
  rules:
    - host: fenixgate.lat
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fenixgate
                port:
                  number: 80
    - host: www.fenixgate.lat
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fenixgate
                port:
                  number: 80
