name: Frontend CI/CD

on:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-main
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write
    outputs:
      owner: ${{ steps.lower.outputs.owner }}

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        id: lower
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]'
          '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./fenixgate-astro
          file: ./fenixgate-astro/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.lower.outputs.owner }}/fenixgate:latest
            ghcr.io/${{ steps.lower.outputs.owner }}/fenixgate:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

  deploy:
    name: Deploy to K3s
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            kubectl apply -f /etc/fg/fenixgatelanding/k8s/deployment.yaml -n fg
            kubectl apply -f /etc/fg/fenixgatelanding/k8s/service.yaml -n fg
            kubectl apply -f /etc/fg/fenixgatelanding/k8s/ingress.yaml -n fg
            kubectl set image deployment/fenixgate \
              fenixgate=ghcr.io/${{ needs.build-and-push.outputs.owner }}/fenixgate:${{ github.sha }} \
              -n fg
            kubectl rollout status deployment/fenixgate -n fg --timeout=180s || \
              (kubectl rollout undo deployment/fenixgate -n fg && exit 1)
